name: Telegram Daily Currency Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send immediately (ignore scheduled time window)"
        required: false
        default: "false"
  schedule:
    # UTC ≈ 16:15 Chișinau (EEST/EET). Script uses local window 16:15–17:45 + dedup cache.
    - cron: "15 13,14 * * *"

concurrency:
  group: telegram-daily-bot
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calendar date (Europe/Chisinau)
        id: chidate
        run: echo "d=$(TZ=Europe/Chisinau date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore daily send dedup marker
        uses: actions/cache@v4
        with:
          path: bot/.telegram-daily-sent
          key: telegram-daily-sent-v1-${{ steps.chidate.outputs.d }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install deps
        working-directory: bot
        run: npm ci

      - name: Daily send (16:15–17:45 Chișinău window or force_send)
        working-directory: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          FORCE_SEND: ${{ github.event_name == 'push' && 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_send || 'false') }}
          GA_EVENT_NAME: ${{ github.event_name }}
          TELEGRAM_DEDUP_FILE: ${{ github.workspace }}/bot/.telegram-daily-sent
        run: node scripts/github-action-daily.js
