name: Telegram Daily Currency Bot

on:
  # Manual trigger — do not remove: GitHub → Actions → this workflow → "Run workflow"
  workflow_dispatch:
  schedule:
    # Once daily: 13:15 UTC = 16:15 Europe/Chisinau during EEST (summer). In EET (winter) same UTC = 15:15 local — change to "15 14 * * *" if you want 16:15 in winter instead.
    - cron: "15 13 * * *"

concurrency:
  group: telegram-daily-bot
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: bot
        run: npm ci

      - name: Daily send
        working-directory: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          GA_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/github-action-daily.js
