name: Telegram Daily Currency Bot

on:
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send immediately (ignore 16:05 check)"
        required: false
        default: "false"
  schedule:
    # GitHub cron is UTC only. 16:05 Europe/Chisinau is 13:05 UTC (EEST) or 14:05 UTC (EET).
    # Two daily triggers; the script sends only when local time is exactly 16:05 (the other exits without sending).
    - cron: "5 13,14 * * *"

concurrency:
  group: telegram-daily-bot
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    # Optional: use Environment secrets — create e.g. "telegram-bot", add secrets there, then set:
    # environment: telegram-bot
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install deps
        working-directory: bot
        run: npm ci

      - name: Run daily bot (poll updates + send if 16:05)
        working-directory: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
        run: node scripts/github-action-daily.js

