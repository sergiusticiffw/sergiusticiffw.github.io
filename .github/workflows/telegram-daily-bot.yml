name: Telegram Daily Currency Bot

on:
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send immediately (ignore 16:15 check)"
        required: false
        default: "false"
  schedule:
    # GitHub cron is UTC. 16:15 Europe/Chisinau ≈ 13:15 UTC (EEST) or 14:15 UTC (EET).
    - cron: "15 13,14 * * *"

concurrency:
  group: telegram-daily-bot
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install deps
        working-directory: bot
        run: npm ci

      - name: Daily send (16:15 Chișinău or force_send)
        working-directory: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
        run: node scripts/github-action-daily.js
